<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AgRadius Pro</title>

<meta name="description" content="FMCSA Agricultural Exemption Radius Tool for 150 air-mile agricultural exemption planning.">
<meta name="theme-color" content="#37F5D6">
<meta name="application-name" content="AgRadius Pro">

<!-- PWA / MOBILE -->

<link rel="manifest" href="pwa/manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="AgRadius Pro">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<!-- LINK PREVIEW / SOCIAL SHARE -->

<link rel="canonical" href="https://hackerzz69.github.io/agradius-pro/">

<meta property="og:type" content="website">
<meta property="og:locale" content="en_US">
<meta property="og:site_name" content="AgRadius Pro">
<meta property="og:title" content="AgRadius Pro">
<meta property="og:description" content="FMCSA Agricultural Exemption Radius Tool for 150 air-mile agricultural exemption planning.">
<meta property="og:url" content="https://hackerzz69.github.io/agradius-pro/">
<meta property="og:image" content="https://hackerzz69.github.io/agradius-pro/assets/social-preview.png">
<meta property="og:image:secure_url" content="https://hackerzz69.github.io/agradius-pro/assets/social-preview.png">
<meta property="og:image:type" content="image/png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:alt" content="AgRadius Pro FMCSA Agricultural Exemption Radius Tool">

<!-- TWITTER / X CARD -->

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="AgRadius Pro">
<meta name="twitter:description" content="FMCSA Agricultural Exemption Radius Tool for 150 air-mile agricultural exemption planning.">
<meta name="twitter:image" content="https://hackerzz69.github.io/agradius-pro/assets/social-preview.png">

<!-- LEAFLET CSS -->

<link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
>

<link
    rel="stylesheet"
    href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"
>

<!-- APP CSS -->

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/hero.css">
<link rel="stylesheet" href="css/buttons.css">
<link rel="stylesheet" href="css/cards.css">
<link rel="stylesheet" href="css/map.css">
<link rel="stylesheet" href="css/mobile.css">

</head>

<body>

<div id="app">

    <header class="hero">

        <div class="hero-bg-glow"></div>

        <nav class="hero-nav" aria-label="Main Navigation">

            <button class="nav-btn menu-btn" aria-label="Open Menu" type="button">

                <img
                    src="icons/menu.svg"
                    alt=""
                >

            </button>

            <div class="hero-badge">

                <img
                    src="icons/shield.svg"
                    alt=""
                >

                <span>
                    FMCSA Compliant
                </span>

            </div>

            <button class="nav-btn notify-btn" aria-label="Notifications" type="button">

                <img
                    src="icons/bell.svg"
                    alt=""
                >

                <span class="notify-dot"></span>

            </button>

        </nav>

        <section class="hero-main">

            <div class="hero-left">

                <div class="location-tile location-tile-art">

                    <img
                        src="assets/location-tile.png"
                        alt=""
                    >

                </div>

                <div class="hero-copy">

                    <h1>
                        Air Mile
                        <span>Radius Pro</span>
                    </h1>

                    <p>
                        FMCSA AG EXEMPTION RADIUS TOOL
                    </p>

                </div>

            </div>

            <div class="hero-art">

                <img
                    src="assets/usa-map.png"
                    alt="Lower 48 Map"
                    class="hero-map"
                >

                <img
                    src="assets/truck.png"
                    alt="Agricultural Hopper Trailer"
                    class="hero-truck"
                >

            </div>

        </section>

        <section class="hero-features" aria-label="Features">

            <div class="feature">

                <img
                    src="icons/gps.svg"
                    alt=""
                >

                <div>
                    <strong>
                        Real-Time GPS
                    </strong>

                    <span>
                        Accurate Location
                    </span>
                </div>

            </div>

            <div class="feature">

                <img
                    src="icons/shield.svg"
                    alt=""
                >

                <div>
                    <strong>
                        FMCSA Compliant
                    </strong>

                    <span>
                        Stay Legal
                    </span>
                </div>

            </div>

            <div class="feature">

                <img
                    src="icons/map.svg"
                    alt=""
                >

                <div>
                    <strong>
                        Interactive Map
                    </strong>

                    <span>
                        Explore Freely
                    </span>
                </div>

            </div>

            <div class="feature">

                <img
                    src="icons/route.svg"
                    alt=""
                >

                <div>
                    <strong>
                        Plan Confidently
                    </strong>

                    <span>
                        Drive Smarter
                    </span>
                </div>

            </div>

        </section>

        <section class="hero-status" aria-label="Current Radius Status">

            <div class="status-item">

                <div class="status-dot"></div>

                <div>
                    <span>
                        GPS Status
                    </span>

                    <strong id="gpsStatus">
                        Ready
                    </strong>
                </div>

            </div>

            <div class="status-divider"></div>

            <div class="status-item">

                <div class="status-icon">

                    <img
                        src="icons/center.svg"
                        alt=""
                    >

                </div>

                <div>
                    <span>
                        Center
                    </span>

                    <strong id="centerCoords">
                        Waiting for GPS
                    </strong>
                </div>

            </div>

            <div class="status-divider"></div>

            <div class="status-item">

                <div class="status-icon">

                    <img
                        src="icons/radius.svg"
                        alt=""
                    >

                </div>

                <div>
                    <span>
                        Radius
                    </span>

                    <strong id="radiusDisplay">
                        150 Air Miles
                    </strong>
                </div>

            </div>

            <button
                id="locateBtn"
                class="location-btn"
                type="button"
            >

                <img
                    src="icons/center.svg"
                    alt=""
                >

                <span>
                    My Location
                </span>

            </button>

        </section>

    </header>

    <main>

        <section class="map-section" id="mapSection">

            <div class="map-shell clean-map-shell">

                <div
                    id="map"
                    aria-label="AgRadius Pro Interactive Map"
                ></div>

            </div>

        </section>

    </main>

</div>

<!-- LEAFLET JS -->

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

<!-- APP JS -->

<script
    type="module"
    src="js/app.js"
></script>

</body>
</html>
