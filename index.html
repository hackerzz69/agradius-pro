<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AgRadius Pro</title>

<meta name="theme-color" content="#37F5D6">
<meta name="description" content="FMCSA Agricultural Exemption Radius Tool">

<!-- LEAFLET -->

<link
rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<link
rel="stylesheet"
href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css">

<!-- APP CSS -->

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/hero.css">
<link rel="stylesheet" href="css/buttons.css">
<link rel="stylesheet" href="css/cards.css">
<link rel="stylesheet" href="css/map.css">
<link rel="stylesheet" href="css/mobile.css">

<link rel="manifest" href="manifest.json">

</head>

<body>

<header class="hero">

    <div class="hero-top">

        <button class="menu-btn">
            ☰
        </button>

        <div class="hero-badge">

            <img
                src="icons/shield.svg"
                alt="FMCSA">

            FMCSA Compliant

        </div>

        <button class="notify-btn">
            🔔
        </button>

    </div>

    <div class="hero-main">

        <div class="hero-text">

            <h1>
                Air Mile
                <span>Radius Pro</span>
            </h1>

            <p>
                FMCSA Agricultural
                Exemption Radius Tool
            </p>

        </div>

        <div class="hero-image">

            <img
                src="assets/file_000000004d5471fd8d06c56871c6bd31.png"
                alt="Truck">

        </div>

    </div>

    <div class="hero-features">

        <div class="feature">

            <img src="icons/gps.svg">

            <span>
                Real-Time GPS
            </span>

        </div>

        <div class="feature">

            <img src="icons/shield.svg">

            <span>
                FMCSA Compliant
            </span>

        </div>

        <div class="feature">

            <img src="icons/map.svg">

            <span>
                Interactive Map
            </span>

        </div>

        <div class="feature">

            <img src="icons/route.svg">

            <span>
                Route Planning
            </span>

        </div>

    </div>

</header>

<script src="js/app.js"></script>

</body>
</html>
